name: Instagram Sync

on:
  schedule:
    # Täglich 06:30 UTC (~ 07:30 / 08:30 deutsche Zeit)
    - cron: "30 6 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync script
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: node scripts/sync-instagram.js

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain data/instagram.json images/insta/)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/instagram.json images/insta/
            git commit -m "chore(insta): sync feed [skip ci]"
            git push
          else
            echo "Keine Änderungen — nichts zu committen."
          fi
